# 分类说明
categories:
  tech_general:
    name: "综合技术"
    description: "技术社区 AI 相关内容"

  ai_research:
    name: "AI 研究"
    description: "学术论文和研究进展"

  company_blog:
    name: "公司博客"
    description: "AI 公司官方技术博客"

  cn_community:
    name: "中文社区"
    description: "中文 AI 技术媒体"

  reddit:
    name: "Reddit 社区"
    description: "Reddit AI 相关讨论区"

  news:
    name: "行业资讯"
    description: "AI 行业新闻和动态"

  finance_global:
    name: "国际财经"
    description: "国际财经媒体"

  finance_tech:
    name: "科技财经"
    description: "科技创业与投融资"

  finance_cn:
    name: "国内财经"
    description: "中文财经媒体"

# 采集配置
settings:
  fetch_interval: 3600  # 采集间隔 (秒)
  max_items_per_source: 50  # 每次最多采集条目数
  timeout: 30  # 请求超时 (秒)
  user_agent: "KnowledgeBaseBot/1.0"
