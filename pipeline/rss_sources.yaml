# RSS 数据源配置
# 用于知识库内容采集

sources:
  # 综合技术
  - name: "Hacker News Best (AI)"
    url: "https://hnrss.org/best?q=AI+OR+LLM+OR+machine+learning&points=100"
    category: "tech_general"
    enabled: true
    description: "Hacker News 高票 AI 相关文章 (≥100 points)"

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ai,ml.rss"
    category: "tech_general"
    enabled: true
    description: "Lobsters AI/ML 标签聚合"

  # AI 研究
  - name: "arXiv cs.AI"
    url: "http://export.arxiv.org/rss/cs.AI"
    category: "ai_research"
    enabled: false
    description: "arXiv 人工智能最新论文 (更新量大，默认关闭)"

  - name: "arXiv cs.LG"
    url: "http://export.arxiv.org/rss/cs.LG"
    category: "ai_research"
    enabled: false
    description: "arXiv 机器学习最新论文 (更新量大，默认关闭)"

  - name: "arXiv cs.CL"
    url: "http://export.arxiv.org/rss/cs.CL"
    category: "ai_research"
    enabled: false
    description: "arXiv 计算与语言 (NLP) 论文 (更新量大，默认关闭)"

  # 公司博客
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "company_blog"
    enabled: true
    description: "OpenAI 官方博客"

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/news/rss"
